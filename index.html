<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gerador de Nada Consta — SENAI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root{
  --bg:#f0f4f9;
  --panel:#ffffff;
  --text:#1e2535;
  --text2:#5a657a;
  --border:#d5dde8;
  --inp:#ffffff;
  --accent:#1a5fa8;
  --accent2:#134d8a;
  --green:#1a7a46;
  --green2:#135c34;
  --copy-bg:#eef4ff;
  --copy-border:#b8d0f5;
  --copy-text:#1a3f7a;
  --lbl:#6b7a90;
}
[data-dark]{
  --bg:#111722;
  --panel:#1a2233;
  --text:#dde4f0;
  --text2:#8a97ad;
  --border:#2a3a52;
  --inp:#1e2d45;
  --accent:#5ba3f5;
  --accent2:#4a8fe0;
  --green:#24a85f;
  --green2:#1c8a4e;
  --copy-bg:#162035;
  --copy-border:#2a4a7a;
  --copy-text:#5ba3f5;
  --lbl:#7a8da5;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--bg);min-height:100vh;transition:background .3s,color .3s}

/* ── HEADER ─────────────────────────────── */
.hdr{
  background:#1043a0;
  padding:0 28px;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 10px rgba(0,0,0,.25);
}
.hdr-left{display:flex;align-items:center;gap:16px}
.hdr-logo{height:34px;object-fit:contain}
.hdr-sep{width:1px;height:30px;background:rgba(255,255,255,.25)}
.hdr-title{color:#fff;font-size:16px;font-weight:700;letter-spacing:.2px}
.hdr-sub{color:rgba(255,255,255,.65);font-size:11px;margin-top:1px}

/* Toggle switch */
.toggle-wrap{display:flex;align-items:center;gap:8px}
.toggle-label{color:rgba(255,255,255,.75);font-size:12px}
.toggle{position:relative;width:52px;height:26px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{
  position:absolute;inset:0;background:rgba(255,255,255,.2);
  border-radius:13px;transition:background .3s;border:1px solid rgba(255,255,255,.3);
}
.toggle input:checked ~ .toggle-track{background:rgba(255,255,255,.15)}
.toggle-thumb{
  position:absolute;top:3px;left:3px;
  width:20px;height:20px;background:#fff;border-radius:50%;
  transition:transform .3s;display:flex;align-items:center;justify-content:center;
  font-size:12px;line-height:1;
}
.toggle input:checked ~ .toggle-thumb{transform:translateX(26px)}

/* ── LAYOUT ─────────────────────────────── */
.main{display:flex;gap:24px;padding:24px 28px}

/* ── LEFT PANEL ─────────────────────────── */
.left{
  width:288px;flex-shrink:0;
  background:var(--panel);border-radius:12px;padding:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);align-self:flex-start;
  transition:background .3s;
}
.section-title{
  font-size:10px;font-weight:700;color:var(--lbl);
  text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:1.5px solid var(--border);
  transition:color .3s,border-color .3s;
}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--lbl);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px;transition:color .3s}
.field input{
  width:100%;padding:9px 10px;
  border:1.5px solid var(--border);border-radius:7px;
  font-size:13px;color:var(--text);background:var(--inp);
  font-family:Arial,sans-serif;transition:border .2s,background .3s,color .3s;
}
.field input:focus{outline:none;border-color:var(--accent)}

.btn{
  width:100%;padding:10px;font-size:13px;font-weight:700;
  border:none;border-radius:7px;cursor:pointer;margin-top:7px;
  font-family:Arial,sans-serif;transition:background .2s,opacity .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-gerar{background:#1a5fa8;color:#fff}
.btn-gerar:hover{background:#134d8a}
.btn-limpar{background:var(--inp);color:var(--text2);border:1.5px solid var(--border)}
.btn-limpar:hover{background:var(--border)}
.btn-pdf{background:#1a7a46;color:#fff;display:none}
.btn-pdf:hover{background:#135c34}
.btn-pdf:disabled{opacity:.65;pointer-events:none}

.divider{height:1px;background:var(--border);margin:16px 0;transition:background .3s}

.copy-box{background:var(--copy-bg);border:1.5px solid var(--copy-border);border-radius:9px;padding:13px;transition:background .3s,border-color .3s}
.copy-title{font-size:10px;font-weight:700;color:var(--lbl);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;transition:color .3s}
.copy-phrase{font-size:12px;color:var(--copy-text);font-style:italic;line-height:1.55;margin-bottom:10px;transition:color .3s}
.btn-copy{
  width:100%;padding:8px;font-size:12px;font-weight:700;
  background:var(--accent);color:#fff;border:none;border-radius:7px;cursor:pointer;
  font-family:Arial,sans-serif;transition:background .2s;
}
.btn-copy:hover{background:var(--accent2)}
.btn-copy.ok{background:#1a7a46}

/* ── RIGHT / PREVIEW ────────────────────── */
.right{
  flex:1;background:var(--panel);border-radius:12px;padding:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);transition:background .3s;
}
.right .section-title{margin-bottom:16px}

/* A4 page */
.a4-wrap{max-width:560px;margin:0 auto}
.a4{
  position:relative;
  width:100%;
  aspect-ratio:1654/2339;
  background:#fff;
  overflow:hidden;
  box-shadow:0 4px 28px rgba(0,0,0,.18);
  font-family:Arial,sans-serif;
}
/* Timbrado PNG fills the whole page — logo, watermark, footer all included */
.a4-wm{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:fill;
  z-index:0;
  display:block;
}
/* Text layer sits on top */
.a4-content{
  position:absolute;inset:0;
  z-index:1;
  pointer-events:none;
}
/* DECLARAÇÃO title — matches original document */
.a4-title{
  position:absolute;
  top:26%;left:0;right:0;
  text-align:center;
  font-size:clamp(9px,1.85vw,18px);
  font-weight:700;
  letter-spacing:.35em;
  color:#111;
  display:none;
}
/* Body paragraph */
.a4-text{
  position:absolute;
  top:33%;left:9%;right:9%;
  text-align:center;
  font-size:clamp(6px,1.12vw,11.5px);
  line-height:1.9;
  color:#222;
  display:none;
}
/* Date */
.a4-date{
  position:absolute;
  top:43%;left:0;right:0;
  text-align:center;
  font-size:clamp(6px,1.12vw,11.5px);
  color:#222;
  display:none;
}
/* Org info bottom-left — above footer */
.a4-org{
  position:absolute;
  bottom:15.5%;left:5.5%;
  font-size:clamp(5px,0.95vw,10px);
  color:#222;line-height:1.7;
  display:none;
}
/* Hint when empty */
.a4-hint{
  position:absolute;
  top:38%;left:0;right:0;
  text-align:center;
  color:#bbb;
  font-size:clamp(6px,1vw,10px);
  font-style:italic;
}

@media(max-width:800px){
  .main{flex-direction:column;padding:16px}
  .left{width:100%}
  .hdr{padding:0 16px}
}
</style>
</head>

<script>
/* ── THEME ── */
function setTheme(dark){
  dark ? document.body.setAttribute('data-dark','') : document.body.removeAttribute('data-dark');
  document.getElementById('thumbIcon').textContent  = dark ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = dark ? '🌙 Escuro' : '☀️ Claro';
}

/* ── INIT DATE ── */
document.getElementById('iData').value = new Date().toISOString().split('T')[0];

/* ── CPF FORMAT ── */
function fmtCpf(el){
  let v=el.value.replace(/\D/g,'').slice(0,11);
  if(v.length>9) v=v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6,9)+'-'+v.slice(9);
  else if(v.length>6) v=v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6);
  else if(v.length>3) v=v.slice(0,3)+'.'+v.slice(3);
  el.value=v;
}

/* ── DATE FORMAT ── */
function fmtData(s){
  const [y,m,d]=s.split('-');
  const M=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return +d+' de '+M[+m-1]+' de '+y;
}

/* ── LIVE UPDATE (typing) ── */
function liveUpdate(){
  const nome=document.getElementById('iNome').value.trim();
  const cpf =document.getElementById('iCpf').value.trim();
  const data=document.getElementById('iData').value;
  if(nome&&cpf&&data){
    document.getElementById('aText').innerHTML=
      'Declaramos, para os devidos fins, que o aluno <strong>'+nome+'</strong>, CPF: '+cpf+
      ', (Curso Técnico) está com sua situação regular no financeiro.';
    document.getElementById('aDate').textContent='Fortaleza - CE, '+fmtData(data)+'.';
  }
}

/* ── GERAR ── */
function gerar(){
  const nome=document.getElementById('iNome').value.trim();
  const cpf =document.getElementById('iCpf').value.trim();
  const data=document.getElementById('iData').value;
  if(!nome||!cpf||!data){alert('Preencha todos os campos!');return;}
  liveUpdate();
  show('aTitle');show('aText');show('aDate');show('aOrg');
  document.getElementById('aHint').style.display='none';
  document.getElementById('btnPdf').style.display='flex';
}

/* ── LIMPAR ── */
function limpar(){
  ['iNome','iCpf'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('iData').value=new Date().toISOString().split('T')[0];
  document.getElementById('aText').innerHTML='';
  document.getElementById('aDate').textContent='';
  hide('aTitle');hide('aText');hide('aDate');hide('aOrg');
  document.getElementById('aHint').style.display='block';
  document.getElementById('btnPdf').style.display='none';
}

function show(id){document.getElementById(id).style.display='block'}
function hide(id){document.getElementById(id).style.display='none'}

/* ── COPIAR ── */
function copiar(){
  const txt='Segue Nada Consta conforme solicitado.';
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(txt).then(()=>flash()).catch(()=>fallback(txt));
  } else { fallback(txt); }
}
function fallback(txt){
  const ta=document.createElement('textarea');
  ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  document.execCommand('copy');document.body.removeChild(ta);
  flash();
}
function flash(){
  const b=document.getElementById('btnCopy');
  b.textContent='✅ Copiado!';b.classList.add('ok');
  setTimeout(()=>{b.textContent='📋 Copiar frase';b.classList.remove('ok');},2200);
}

/* ── BAIXAR PDF via html2canvas ── */
async function baixarPDF(){
  const nome=document.getElementById('iNome').value.trim();
  const btn=document.getElementById('btnPdf');
  btn.textContent='⏳ Gerando...';btn.disabled=true;
  try{
    const el=document.getElementById('docPage');
    const canvas=await html2canvas(el,{
      scale:4,useCORS:true,allowTaint:true,
      backgroundColor:'#ffffff',logging:false,
      imageTimeout:0
    });
    const img=canvas.toDataURL('image/jpeg',0.98);
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
    pdf.addImage(img,'JPEG',0,0,210,297);
    const fn=nome.split(' ')[0].toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    pdf.save('declaracao_'+fn+'.pdf');
  }catch(e){alert('Erro: '+e.message);}
  finally{btn.textContent='⬇ Baixar PDF';btn.disabled=false;}
}
</script>
